<div class="card">
  <h1>⚖️ BMI Calculator</h1>

  <label for="weight">Weight (kg)</label>
  <input
    id="weight"
    type="number"
    [(ngModel)]="weight"
    placeholder="e.g. 70"
    min="0.1"
    step="0.1"
  />

  <label for="height">Height (meters)</label>
  <input
    id="height"
    type="number"
    [(ngModel)]="height"
    placeholder="e.g. 1.75"
    min="0.1"
    step="0.01"
  />

  <button (click)="calculate()" [disabled]="loading">
    {{ loading ? 'Calculating...' : 'Calculate BMI' }}
  </button>

  <div class="error" *ngIf="errorMessage">{{ errorMessage }}</div>

  <div class="result" *ngIf="result" [ngClass]="getCategoryClass()">
    <div class="bmi-value">{{ result.bmi }}</div>
    <div class="category">{{ result.category }}</div>
  </div>
</div>
