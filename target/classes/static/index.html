<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>BMI Calculator</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            background: white;
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 28px;
            font-size: 1.8rem;
        }

        label {
            display: block;
            margin-bottom: 6px;
            color: #555;
            font-weight: 600;
            font-size: 0.9rem;
        }

        input {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            margin-bottom: 18px;
            transition: border-color 0.2s;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button:hover { opacity: 0.9; }

        #result {
            margin-top: 24px;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            display: none;
        }

        #result.show { display: block; }

        #result .bmi-value {
            font-size: 2.5rem;
            font-weight: 700;
            color: #333;
        }

        #result .category {
            font-size: 1.1rem;
            font-weight: 600;
            margin-top: 6px;
        }

        .Underweight { background: #fff3cd; }
        .Underweight .category { color: #856404; }

        .Normal { background: #d1e7dd; }
        .Normal .category { color: #0f5132; }

        .Overweight { background: #ffe5d0; }
        .Overweight .category { color: #c45e00; }

        .Obese { background: #f8d7da; }
        .Obese .category { color: #842029; }

        #error {
            margin-top: 14px;
            color: #842029;
            background: #f8d7da;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 0.9rem;
            display: none;
        }

        #error.show { display: block; }
    </style>
</head>
<body>
    <div class="card">
        <h1>⚖️ BMI Calculator</h1>

        <label for="weight">Weight (kg)</label>
        <input type="number" id="weight" placeholder="e.g. 70" min="0.1" step="0.1" />

        <label for="height">Height (meters)</label>
        <input type="number" id="height" placeholder="e.g. 1.75" min="0.1" step="0.01" />

        <button onclick="calculateBMI()">Calculate BMI</button>

        <div id="error"></div>
        <div id="result">
            <div class="bmi-value" id="bmiValue"></div>
            <div class="category" id="bmiCategory"></div>
        </div>
    </div>

    <script>
        async function calculateBMI() {
            const weight = parseFloat(document.getElementById('weight').value);
            const height = parseFloat(document.getElementById('height').value);
            const errorEl = document.getElementById('error');
            const resultEl = document.getElementById('result');

            errorEl.className = '';
            resultEl.className = '';

            if (!weight || !height || weight <= 0 || height <= 0) {
                showError('Please enter valid positive values for weight and height.');
                return;
            }

            try {
                const response = await fetch('/api/calculate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ weight, height })
                });

                const data = await response.json();

                if (!response.ok) {
                    showError(Object.values(data).join(', '));
                    return;
                }

                document.getElementById('bmiValue').textContent = data.bmi;
                document.getElementById('bmiCategory').textContent = data.category;
                resultEl.className = `show ${data.category}`;

            } catch (err) {
                showError('Could not connect to the server. Make sure the backend is running.');
            }
        }

        function showError(msg) {
            const el = document.getElementById('error');
            el.textContent = msg;
            el.className = 'show';
        }
    </script>
</body>
</html>
